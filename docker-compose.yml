version: "3"
services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/user/src/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: GTP_db
      POSTGRES_USER: GTP_admin
      POSTGRES_PASSWORD: nimadir12345678
    ports:
      - "5432:5432"